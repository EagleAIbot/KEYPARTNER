# Builds the site and commits the output to docs/ on main.
# GitHub Pages: Settings → Pages → Deploy from a branch → main /docs
# https://eagleaibot.github.io/KEYPARTNER/
name: Pages — build into docs/

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-docs-main
  cancel-in-progress: true

jobs:
  build-deploy:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Write site to docs/ on main
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: main
          folder: dist
          target-folder: docs
          clean: true
          commit-message: 'chore(pages): publish site to docs/'
